# ==============================================================================
#  .github/workflows/docker-publish.yml
#
#  Triggers:
#    - Manual run from Actions tab (workflow_dispatch)
#      with options to choose backend/frontend and push or build-only
#    - Push of a semver tag (v1.2.3) → builds release images and tags with the version
#
#  Required GitHub secrets:
#    GHCR_TOKEN   – Personal Access Token with read/write:packages scope
#                   (or use the auto-provided GITHUB_TOKEN for public repos)
# ==============================================================================

name: Build & Publish Docker Images

on:
  workflow_dispatch:
    inputs:
      build_backend:
        description: Build backend image
        required: true
        default: true
        type: boolean
      build_frontend:
        description: Build frontend image
        required: true
        default: true
        type: boolean
      push_images:
        description: Push images to GHCR (disable for build-only validation)
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/club-erp-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/club-erp-frontend

jobs:
  preflight:
    name: Preflight tag validation
    runs-on: ubuntu-latest
    outputs:
      tag_on_main: ${{ steps.check.outputs.tag_on_main }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure version tag points to main history
        id: check
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "tag_on_main=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG_COMMIT=$(git rev-list -n 1 "$GITHUB_REF")
          git fetch origin main --depth=1

          if git merge-base --is-ancestor "$TAG_COMMIT" "origin/main"; then
            echo "tag_on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_on_main=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit contained in origin/main"
          fi

  preflight-failed:
    name: Preflight failed (tag not on main)
    needs: preflight
    if: ${{ needs.preflight.outputs.tag_on_main != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Write actionable summary
        shell: bash
        run: |
          {
            echo "## Preflight failed"
            echo
            echo "Version tags must point to a commit contained in origin/main."
            echo
            echo "- Tag: ${GITHUB_REF_NAME}"
            echo "- Ref: ${GITHUB_REF}"
            echo
            echo "Move/recreate the tag on a main commit, then rerun."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail workflow after summary
        run: exit 1

  # ── Backend ────────────────────────────────────────────────────────────────
  build-backend:
    name: Backend Docker image
    needs: preflight
    if: ${{ needs.preflight.outputs.tag_on_main == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.build_backend == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || github.event.inputs.push_images == 'true') }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || github.event.inputs.push_images == 'true') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Frontend ───────────────────────────────────────────────────────────────
  build-frontend:
    name: Frontend Docker image
    needs: preflight
    if: ${{ needs.preflight.outputs.tag_on_main == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.build_frontend == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || github.event.inputs.push_images == 'true') }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # Context is the monorepo root (pnpm workspace packages are needed)
          context: .
          file: ./frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || github.event.inputs.push_images == 'true') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
